name: Voltrega Frontend CI

on:
  push:
    branches: [deploy]
  pull_request:
    branches: [deploy]
  workflow_dispatch:

jobs:
  build:
    name: Build VoltregaCF (Angular)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build VoltregaCF (production)
        run: npm run build:voltregacf:prod
