name: Deploy Voltrega Frontend to GitHub Pages

# on:
#   push:
#     branches: [deploy]
#   workflow_dispatch:
#     inputs:
#       publish_branch:
#         description: 'Target branch for GitHub Pages'
#         required: true
#         default: 'gh-pages'

jobs:
  deploy:
    name: Deploy Voltrega to GitHub Pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build VoltregaCF (GitHub Pages)
        run: npm run build:voltregacf:gh-pages

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: ${{ github.event.inputs.publish_branch || 'gh-pages' }}
          cname: ''  # Set to custom domain if configured (e.g., app.tacticalhub.lol)
