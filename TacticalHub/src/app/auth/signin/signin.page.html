<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Welcome to TacticalHub</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="signin-container">
    <!-- Logo Section -->
    <div class="logo-section">
      <div class="logo-circle">
        <ion-icon name="person" class="logo-icon"></ion-icon>
      </div>
      <h1 class="app-title">TacticalHub</h1>
      <p class="app-subtitle">Your Football Training Community</p>
    </div>

    <!-- Sign In Form -->
    <ion-card class="auth-card">
      <ion-card-header>
        <ion-card-title class="card-title">Sign In</ion-card-title>
      </ion-card-header>
      
      <ion-card-content>
        <form [formGroup]="signinForm" (ngSubmit)="onSignIn()">
          <!-- Email Input -->
          <ion-item class="auth-item">
            <ion-icon name="mail" slot="start" class="input-icon"></ion-icon>
            <ion-label position="stacked">Email</ion-label>
            <ion-input 
              type="email" 
              formControlName="email"
              placeholder="Enter your email"
              class="auth-input">
            </ion-input>
          </ion-item>
          
          <!-- Password Input -->
          <ion-item class="auth-item">
            <ion-icon name="lock-closed" slot="start" class="input-icon"></ion-icon>
            <ion-label position="stacked">Password</ion-label>
            <ion-input 
              type="password" 
              formControlName="password"
              placeholder="Enter your password"
              class="auth-input">
            </ion-input>
          </ion-item>

          <!-- Sign In Button -->
          <ion-button 
            expand="block" 
            type="submit" 
            class="tactical-button-primary auth-button"
            [disabled]="isLoading">
            <ion-spinner name="crescent" *ngIf="isLoading"></ion-spinner>
            <span *ngIf="!isLoading">Sign In</span>
          </ion-button>
        </form>

        <!-- Divider -->
        <div class="divider">
          <span class="divider-text">or continue with</span>
        </div>

        <!-- Social Sign In Buttons -->
        <div class="social-buttons">
          <ion-button 
            fill="outline" 
            expand="block" 
            class="social-button google-button"
            (click)="signInWithGoogle()"
            [disabled]="isLoading">
            <ion-icon name="logo-google" slot="start"></ion-icon>
            Continue with Google
          </ion-button>

          <ion-button 
            fill="outline" 
            expand="block" 
            class="social-button apple-button"
            (click)="signInWithApple()"
            [disabled]="isLoading">
            <ion-icon name="logo-apple" slot="start"></ion-icon>
            Continue with Apple
          </ion-button>
        </div>

        <!-- Sign Up Link -->
        <div class="signup-link">
          <ion-text color="medium">
            Don't have an account? 
            <span class="link-text" (click)="navigateToSignUp()">Sign up</span>
          </ion-text>
        </div>
      </ion-card-content>
    </ion-card>
  </div>

  <!-- Toast for messages -->
  <ion-toast
    [isOpen]="showToast"
    [message]="toastMessage"
    duration="3000"
    position="top"
    (didDismiss)="onToastDismiss()">
  </ion-toast>
</ion-content>
