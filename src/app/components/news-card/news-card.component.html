<article class="news-card" [style.animation-delay]="animationDelay() * 0.04 + 's'" (click)="onCardClick()">
  
  <div class="news-content">
    <h2 class="news-title">{{ news().title }}</h2>
    <p class="news-body">{{ news().body }}</p>
    
  @if (primaryImageUrl) {
    <div class="news-image" [style.background-image]="'url(' + primaryImageUrl + ')'">
    </div>
  }
    @if (isAdmin()) {
      <div class="news-footer">
      <div class="footer-actions">
          <div class="vote-section news-admin-actions">
            <button class="btn-text" type="button" (click)="onEdit($event)">{{ 'common.edit' | translate }}</button>
            @if (news().status !== AppStatus.Active) {
              <button class="btn-text" type="button" (click)="onPublish($event)">{{ 'user.news.publish' | translate }}</button>
            } @else {
              <button class="btn-text" type="button" (click)="onUnpublish($event)">{{ 'user.news.unpublish' | translate }}</button>
            }
            <button class="btn-text danger" type="button" (click)="onDelete($event)">{{ 'common.delete' | translate }}</button>
          </div>
      </div>
      </div>
    }
    <div class="news-meta">
      <span class="news-time">{{ getTimeAgo(news().publishedAt || news().createdAt) }}</span>
    </div>
  </div>
</article>
