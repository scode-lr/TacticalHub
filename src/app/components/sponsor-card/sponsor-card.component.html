<div class="sponsor-card" [class.expanded]="expanded() || addMode()">
  @if (addMode()) {
    <app-sponsor-form
      [isSaving]="isSaving()"
      (save)="onDirectSave($event)"
      (cancel)="onDirectCancel()" />
  } @else if (!expanded()) {
    <div class="card-row" (click)="onExpand()">
      <div class="reorder-buttons">
        <button
          class="icon-button small"
          (click)="onMoveUp(); $event.stopPropagation()"
          [disabled]="isFirst()">
          <ion-icon name="chevron-up-outline"></ion-icon>
        </button>
        <button
          class="icon-button small"
          (click)="onMoveDown(); $event.stopPropagation()"
          [disabled]="isLast()">
          <ion-icon name="chevron-down-outline"></ion-icon>
        </button>
      </div>
      <div class="sponsor-thumbnail">
        <img
          [src]="sponsor()!.imageUrl || 'assets/image-non-available.svg'"
          [alt]="sponsor()!.name"
          appDefaultImage />
      </div>
      <div class="sponsor-info">
        <span class="sponsor-name">{{ sponsor()!.name }}</span>
      </div>
      <button
        class="icon-button delete"
        (click)="onDelete(); $event.stopPropagation()"
        [disabled]="isSaving()">
        <ion-icon name="trash-outline"></ion-icon>
      </button>
    </div>
  } @else {
    <app-sponsor-form
      [sponsor]="sponsor()!"
      [isSaving]="isSaving()"
      (save)="onSave($event)"
      (cancel)="onCancel()" />
  }
</div>
