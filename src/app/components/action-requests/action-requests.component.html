@if (actionRequests().length > 0) {
  <div class="action-requests-card" (click)="openListModal()">
    <div class="request-icon">
      <ion-icon name="document-text-outline"></ion-icon>
    </div>

    <div class="request-content">
      <h3 class="request-title">{{ 'notifications.actionRequests' | translate }}</h3>
      <p class="request-count">{{ actionRequests().length }} {{ (actionRequests().length === 1 ? 'notifications.pendingRequest' : 'notifications.pendingRequests') | translate }}</p>
    </div>

    <button class="btn-icon request-arrow">
      <ion-icon name="chevron-forward-outline"></ion-icon>
    </button>
  </div>

  <app-action-requests-list-modal
    [isOpen]="isListModalOpen()"
    [requests]="actionRequests()"
    (dismissed)="closeListModal()"
    (requestSelected)="openDetail($event)" />

  <app-submission-review-modal
    [isOpen]="isDetailModalOpen()"
    [notification]="selectedNotification()"
    [submission]="selectedSubmission()"
    [isLoading]="isDetailLoading()"
    [isReviewing]="isReviewing()"
    (dismissed)="closeDetailModal()"
    (approved)="handleApprove($event)"
    (rejected)="handleReject($event)" />
}
