<ion-modal 
  [isOpen]="isOpen()"
  (didDismiss)="closeModal()"
  [breakpoints]="[0, 1]"
  [initialBreakpoint]="1"
  class="player-form-modal">
  <ng-template>
    <div class="modal-container">
      <div class="modal-header">
        <div class="header-info">
          <ion-icon name="person-add-outline" class="header-icon"></ion-icon>
          <div class="header-text">
            <h2 class="modal-title">{{ 'modals.player.title' | translate }}</h2>
            @if (teamName()) {
              <span class="team-name">{{ teamName() }}</span>
            }
          </div>
        </div>
        <button class="close-button" (click)="closeModal()">
          <ion-icon name="close-outline"></ion-icon>
        </button>
      </div>

      <div class="modal-content">
        <div class="form-group">
          <label class="form-label">{{ 'modals.player.playerName' | translate }}</label>
          <ion-input
            type="text"
            [placeholder]="'modals.player.playerNamePlaceholder' | translate"
            [value]="playerName()"
            (ionInput)="onNameChange($event)"
            class="form-input">
          </ion-input>
        </div>

        <div class="form-row">
          <div class="form-group form-group-half">
            <label class="form-label">{{ 'modals.player.number' | translate }}</label>
            <ion-input
              type="number"
              [placeholder]="'modals.player.numberPlaceholder' | translate"
              [value]="playerNumber()"
              (ionInput)="onNumberChange($event)"
              min="1"
              max="99"
              class="form-input">
            </ion-input>
          </div>

          <div class="form-group form-group-half">
            <label class="form-label">{{ 'modals.player.position' | translate }}</label>
            <ion-select
              [value]="playerPosition()"
              (ionChange)="onPositionChange($event)"
              interface="popover"
              [placeholder]="'modals.player.positionPlaceholder' | translate"
              class="form-select">
              @for (pos of positions; track pos.value) {
                <ion-select-option [value]="pos.value">{{ pos.label | translate }}</ion-select-option>
              }
            </ion-select>
          </div>
        </div>

        <div class="form-group">
          <button 
            class="captain-toggle" 
            [class.active]="isCaptain()"
            (click)="toggleCaptain()">
            <span class="captain-badge">C</span>
            <span class="captain-label">{{ 'modals.player.teamCaptain' | translate }}</span>
          </button>
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn-cancel" (click)="closeModal()">{{ 'common.cancel' | translate }}</button>
        <button 
          class="btn-submit" 
          [disabled]="!isFormValid()"
          (click)="submitPlayer()">
          {{ 'modals.player.addPlayer' | translate }}
        </button>
      </div>
    </div>
  </ng-template>
</ion-modal>
