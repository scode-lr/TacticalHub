<ion-modal
  [isOpen]="isOpen()"
  (didDismiss)="close()"
  class="form-preview-modal">
  <ng-template>
    <div class="modal-container">

      <div class="modal-header">
        <div class="header-info">
          <ion-icon name="eye-outline" class="header-icon"></ion-icon>
          <div class="header-text">
            <h2 class="modal-title">{{ 'admin.settingsForms.preview.title' | translate }}</h2>
            @if (formName()) {
              <span class="form-subtitle">{{ formName() }}</span>
            }
          </div>
        </div>
        <button class="close-button" (click)="close()">
          <ion-icon name="close-outline"></ion-icon>
        </button>
      </div>

      <div class="modal-content">
        @if (fields().length === 0) {
          <p class="empty-state">{{ 'admin.settingsForms.preview.noFields' | translate }}</p>
        } @else {
          <div class="preview-notice">{{ 'admin.settingsForms.preview.notice' | translate }}</div>
          <form class="preview-form" novalidate>
            <app-dynamic-form-fields
              [fields]="fields()"
              [form]="previewForm"
            />
          </form>
        }
      </div>

    </div>
  </ng-template>
</ion-modal>
