<ion-modal
  [isOpen]="isOpen()"
  (didDismiss)="close()"
  class="preview-modal">
  <ng-template>
    <div class="modal-container">

      <div class="modal-header">
        <div class="header-info">
          <ion-icon name="eye-outline" class="header-icon"></ion-icon>
          <div class="header-text">
            <h2 class="modal-title">{{ title() | translate }}</h2>
            @if (subtitle()) {
              <span class="modal-subtitle">{{ subtitle() }}</span>
            }
          </div>
        </div>
        <button class="close-button" (click)="close()">
          <ion-icon name="close-outline"></ion-icon>
        </button>
      </div>

      <div class="modal-content">
        @if (isEmpty()) {
          <p class="empty-state">{{ emptyMessage() | translate }}</p>
        } @else {
          @if (notice()) {
            <div class="preview-notice">{{ notice() | translate }}</div>
          }
          <ng-content />
        }
      </div>

    </div>
  </ng-template>
</ion-modal>
