<div class="page-header">
  <div class="header-content">
    @if (showBackButton()) {
      <button class="back-button" (click)="onBackClick()">
        <ion-icon name="arrow-back-outline"></ion-icon>
        <span>{{ 'common.back' | translate }}</span>
      </button>
    }
    
    <div class="user-menu" (click)="toggleUserMenu()" [class.menu-open]="showUserMenu()">
      <ion-avatar class="user-avatar">
        <ion-img [src]="avatarUrl()" [alt]="user?.username" (ionError)="onAvatarError()"></ion-img>
      </ion-avatar>
    </div>
    
    @if (showUserMenu()) {
      <div class="user-dropdown">
        <button class="dropdown-item logout-item" (click)="logout()">
          <ion-icon name="log-out-outline"></ion-icon>
          <span>{{ 'auth.signOut' | translate }}</span>
        </button>
      </div>
    }
  </div>
</div>
