<div class="welcome-page auth-background">
  <!-- Branding Section -->
  <div class="brand-section">
    <app-auth-branding></app-auth-branding>
  </div>

  <!-- Action Section -->
  <div class="action-section">
    <!-- Sign Up Button (Primary) -->
    <button class="btn-primary btn-block" (click)="navigateToSignUp()">
      <ion-icon name="person-add-outline"></ion-icon>
      {{ 'welcome.createAccount' | translate }}
    </button>

    <!-- Sign In Button (Secondary) -->
    <button class="btn-secondary btn-block" (click)="navigateToSignIn()">
      <ion-icon name="log-in-outline"></ion-icon>
      {{ 'welcome.signIn' | translate }}
    </button>

    <div class="powered-by">
      Powered by <strong>Tactical</strong>
    </div>
  </div>
</div>
