<div class="signin-page">
  <!-- Back Button (Mobile Only) -->
  <ion-button 
    fill="clear" 
    class="back-btn"
    (click)="goBack()">
    <ion-icon name="arrow-back" slot="icon-only"></ion-icon>
  </ion-button>

  <!-- Left Side - Branding -->
  <div class="branding-section">
    <div class="brand-content">
      <div class="brand-logo">
        <ion-icon name="shield-checkmark" class="logo-icon"></ion-icon>
      </div>
      <h2 class="brand-title">Tactical.hub</h2>
      <p class="brand-subtitle">Manage your teams and strategies with ease</p>
    </div>
  </div>

  <!-- Right Side - Form -->
  <div class="form-section">
    <div class="form-container">
      <!-- Header -->
      <div class="form-header">
        <h1>Welcome Back</h1>
        <p>Sign in to continue to Tactical.hub</p>
      </div>
      <form [formGroup]="signinForm" (ngSubmit)="onSignIn()" class="signin-form">
        <!-- Email Input -->
        <div class="input-group">
          <ion-input 
            type="email" 
            formControlName="email"
            placeholder="Email"
            fill="outline"
            class="modern-input"
            [class.ion-invalid]="signinForm.get('email')?.invalid && signinForm.get('email')?.touched">
          </ion-input>
          <div class="error-message" *ngIf="signinForm.get('email')?.invalid && signinForm.get('email')?.touched">
            <ion-text color="danger">
              <small>Please enter a valid email</small>
            </ion-text>
          </div>
        </div>
        
        <!-- Password Input -->
        <div class="input-group">
          <ion-input 
            type="password" 
            formControlName="password"
            placeholder="Password"
            fill="outline"
            class="modern-input"
            [class.ion-invalid]="signinForm.get('password')?.invalid && signinForm.get('password')?.touched">
          </ion-input>
          <div class="error-message" *ngIf="signinForm.get('password')?.invalid && signinForm.get('password')?.touched">
            <ion-text color="danger">
              <small>Password is required</small>
            </ion-text>
          </div>
        </div>

        <!-- Sign In Button -->
        <ion-button 
          expand="block" 
          type="submit" 
          class="signin-btn"
          [disabled]="isLoading || !signinForm.valid">
          <ion-spinner name="dots" *ngIf="isLoading"></ion-spinner>
          <span *ngIf="!isLoading">Sign In</span>
        </ion-button>
      </form>

      <!-- Social Login Section -->
      <div class="social-section">
        <div class="divider-line">
          <span class="divider-text">or</span>
        </div>

        <div class="social-buttons">
          <ion-button 
            fill="clear" 
            class="social-btn google-btn"
            (click)="signInWithGoogle()"
            [disabled]="isLoading">
            <ion-icon name="logo-google" slot="icon-only"></ion-icon>
          </ion-button>

          <ion-button 
            fill="clear" 
            class="social-btn apple-btn"
            (click)="signInWithApple()"
            [disabled]="isLoading">
            <ion-icon name="logo-apple" slot="icon-only"></ion-icon>
          </ion-button>
        </div>
      </div>

      <!-- Footer -->
      <div class="form-footer">
        <ion-text class="signup-text">
          Don't have an account? 
          <span class="signup-link" (click)="navigateToSignUp()">Sign up</span>
        </ion-text>
      </div>
    </div>
  </div>

  <!-- Toast for messages -->
  <ion-toast
    [isOpen]="showToast"
    [message]="toastMessage"
    [color]="toastColor"
    duration="3000"
    position="top"
    (didDismiss)="onToastDismiss()">
  </ion-toast>
</div>
