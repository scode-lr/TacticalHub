<ion-content class="role-selection-content">
  <div class="role-selection-container">
    <!-- Header -->
    <div class="header-section">
      <div class="user-info">
        <ion-avatar class="user-avatar">
          <img [src]="user?.avatarUrl || 'assets/default-avatar.png'" [alt]="user?.getFullName()">
        </ion-avatar>
        <h1>Welcome, {{ user?.firstName }}!</h1>
        <p class="subtitle">Select the role you want to use</p>
      </div>
    </div>

    <!-- Role Cards -->
    <div class="roles-section">
      <div class="roles-grid">
        <div 
          *ngFor="let role of user?.roles" 
          class="role-card"
          (click)="selectRole(role)">
          <div class="role-card-content">
            <!-- Role Icon -->
            <div class="role-icon">
              <ion-icon [name]="getRoleIcon(role.name)"></ion-icon>
            </div>

            <!-- Role Info -->
            <div class="role-info">
              <h2 class="role-name">{{ role.name }}</h2>
              <p class="role-club">{{ role.club.name }}</p>
              <p class="role-description">{{ role.description }}</p>
            </div>

            <!-- Permissions Badge -->
            <div class="permissions-badge">
              <ion-icon name="shield-checkmark-outline"></ion-icon>
              <span>{{ role.permissions.length }} permissions</span>
            </div>

            <!-- Arrow -->
            <div class="role-arrow">
              <ion-icon name="chevron-forward"></ion-icon>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Logout Button -->
    <div class="footer-section">
      <ion-button fill="clear" (click)="logout()">
        <ion-icon name="log-out-outline" slot="start"></ion-icon>
        Sign Out
      </ion-button>
    </div>
  </div>
</ion-content>
