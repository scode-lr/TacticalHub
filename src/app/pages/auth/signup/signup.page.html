<div class="signup-page">
  <!-- Back Button (Mobile Only) -->
  <ion-button 
    fill="clear" 
    class="back-btn"
    (click)="goBack()">
    <ion-icon name="arrow-back" slot="icon-only"></ion-icon>
  </ion-button>

  <!-- Left Side - Branding -->
  <div class="branding-section">
    <div class="brand-content">
      <div class="brand-logo">
        <ion-icon name="shield-checkmark" class="logo-icon"></ion-icon>
      </div>
      <h2 class="brand-title">Tactical.hub</h2>
      <p class="brand-subtitle">Join the football training community</p>
    </div>
  </div>

  <!-- Right Side - Form -->
  <div class="form-section">
    <div class="form-container">
      <!-- Header -->
      <div class="form-header">
        <h1>Create Account</h1>
        <p>Sign up to start managing your teams</p>
      </div>
      <form [formGroup]="signupForm" (ngSubmit)="onSignUp()" class="signup-form">
        <!-- Name Inputs Row -->
        <div class="name-row">
          <div class="input-group half-width">
            <ion-input 
              type="text" 
              formControlName="firstName"
              placeholder="First Name"
              fill="outline">
            </ion-input>
          </div>
          
          <div class="input-group half-width">
            <ion-input 
              type="text" 
              formControlName="lastName"
              placeholder="Last Name"
              fill="outline">
            </ion-input>
          </div>
        </div>
        
        <!-- Email Input -->
        <div class="input-group">
          <ion-input 
            type="email" 
            formControlName="email"
            placeholder="Email"
            fill="outline">
          </ion-input>
        </div>
        
        <!-- Password Input -->
        <div class="input-group">
          <ion-input 
            type="password" 
            formControlName="password"
            placeholder="Password"
            fill="outline">
          </ion-input>
        </div>
        
        <!-- Confirm Password Input -->
        <div class="input-group">
          <ion-input 
            type="password" 
            formControlName="confirmPassword"
            placeholder="Confirm Password"
            fill="outline">
          </ion-input>
        </div>

        <!-- Error Messages -->
        <div class="error-messages" *ngIf="signupForm.errors?.['passwordMismatch'] && confirmPassword?.touched">
          <ion-text color="danger">
            <small>Passwords do not match</small>
          </ion-text>
        </div>

        <!-- Sign Up Button -->
        <ion-button 
          expand="block" 
          type="submit" 
          class="signup-btn"
          [disabled]="isLoading || !signupForm.valid">
          <ion-spinner name="dots" *ngIf="isLoading"></ion-spinner>
          <span *ngIf="!isLoading">Create Account</span>
        </ion-button>
      </form>

      <!-- Social Login Section -->
      <div class="social-section">
        <div class="divider-line">
          <span class="divider-text">or</span>
        </div>

        <div class="social-buttons">
          <ion-button 
            fill="clear" 
            class="social-btn google-btn"
            (click)="signUpWithGoogle()"
            [disabled]="isLoading">
            <ion-icon name="logo-google" slot="icon-only"></ion-icon>
          </ion-button>

          <ion-button 
            fill="clear" 
            class="social-btn apple-btn"
            (click)="signUpWithApple()"
            [disabled]="isLoading">
            <ion-icon name="logo-apple" slot="icon-only"></ion-icon>
          </ion-button>
        </div>
      </div>

      <!-- Footer -->
      <div class="form-footer">
        <ion-text class="signin-text">
          Already have an account? 
          <span class="signin-link" (click)="navigateToSignIn()">Sign in</span>
        </ion-text>
      </div>
    </div>
  </div>

  <!-- Toast for messages -->
  <ion-toast
    [isOpen]="showToast"
    [message]="toastMessage"
    duration="3000"
    position="top"
    (didDismiss)="onToastDismiss()">
  </ion-toast>
</div>
