<ion-content [fullscreen]="true">
  <ion-refresher slot="fixed" (ionRefresh)="refreshTeams($event)">
    <ion-refresher-content>
    </ion-refresher-content>
  </ion-refresher>

  <!-- Skip Button -->
  <div class="skip-button-container" *ngIf="(!searchTerm || searchTerm.trim().length === 0) && !hasRequestedTeams">
    <ion-button 
      fill="clear" 
      size="small" 
      class="skip-button"
      (click)="skipSearch()">
      Skip
    </ion-button>
  </div>

  <div class="search-container" [class.has-results]="searchTerm && searchTerm.trim().length > 0" [class.has-continue]="hasRequestedTeams">
    <!-- Welcome Section -->
    <div class="welcome-section">
      <h2 class="welcome-title">Welcome to TacticalHub!</h2>
      <p class="welcome-subtitle">Find and join football teams in your area</p>
    </div>

    <!-- Search Bar -->
    <ion-searchbar
      [(ngModel)]="searchTerm"
      (ionInput)="onSearchChange($event)"
      placeholder="Search teams by name, location, or level"
      class="custom-searchbar">
    </ion-searchbar>

    <!-- Loading Spinner -->
    <div class="loading-container" *ngIf="isLoading && searchTerm && searchTerm.trim().length > 0">
      <ion-spinner name="crescent" class="main-spinner"></ion-spinner>
      <p class="loading-text">Loading teams...</p>
    </div>

    <!-- Teams List -->
    <div class="teams-container" *ngIf="searchTerm && searchTerm.trim().length > 0 && !isLoading">
      <!-- No Results -->
      <div class="no-results" *ngIf="filteredTeams.length === 0">
        <ion-icon name="search" class="no-results-icon"></ion-icon>
        <h3>No teams found</h3>
        <p>Try adjusting your search criteria or create a new team</p>
      </div>

      <!-- Teams Grid -->
      <ion-grid *ngIf="filteredTeams.length > 0">
        <ion-row>
          <ion-col size="12" size-md="6" size-lg="4" *ngFor="let team of filteredTeams">
            <app-team-card 
              [team]="team" 
              (joinTeam)="joinTeam($event)">
            </app-team-card>
          </ion-col>
        </ion-row>
      </ion-grid>
    </div>
  </div>

  <!-- Continue Button -->
  <div class="continue-section" *ngIf="hasRequestedTeams">
    <ion-button 
      expand="block" 
      class="continue-button"
      (click)="continueToHome()">
      Continue ({{ requestedTeamsCount }} {{ requestedTeamsCount === 1 ? 'request' : 'requests' }} sent)
    </ion-button>
  </div>

  <!-- Toast for messages -->
  <ion-toast
    [isOpen]="showToast"
    [message]="toastMessage"
    duration="3000"
    position="top"
    (didDismiss)="onToastDismiss()">
  </ion-toast>
</ion-content>
