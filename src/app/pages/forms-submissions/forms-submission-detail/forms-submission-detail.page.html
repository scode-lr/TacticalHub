<div class="page-container">
  <div class="section-header-with-back-button">
    <app-back-button />
    <h1 class="section-title">{{ 'admin.forms.submissionDetail.title' | translate }}</h1>
  </div>

  @if (loading()) {
    <div class="loading-state"></div>
  }

  @if (!loading() && submission()) {
    <app-submission-detail-view [submission]="submission()!" />
  }
</div>
