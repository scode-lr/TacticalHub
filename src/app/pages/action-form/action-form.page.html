<div class="page-container">
  @if (actionConfig(); as config) {
    <div class="section-header">
      <h1 class="section-title">{{ config.title | translate }}</h1>
      <p class="form-description">{{ config.description | translate }}</p>
    </div>

    <app-dynamic-form
      [fields]="config.fields"
      [submitLabel]="config.submitButtonLabel"
      [cancelLabel]="'viewer.action.form.cancel'"
      [isSubmitting]="isSubmitting()"
      (formSubmit)="onFormSubmit($event)"
      (formCancel)="onFormCancel()">
    </app-dynamic-form>
  }
</div>
