<div class="page-container viewer-action-page">
  <div class="section-header">
    <h1 class="section-title">{{ 'admin.menu.inbox' | translate }}</h1>
  </div>

    <div class="messages-list">
      @for (message of messages(); track message.id) {
        <div class="message-item" [class.read]="message.status === 'read'">
          @if (message.status === 'unread') {
            <span class="new-badge"></span>
          }
          <ion-avatar class="user-avatar">
            <ion-img [src]="message.sender.avatarUrl || 'assets/default-avatar.png'" [alt]="message.id" />
          </ion-avatar>

          <div class="message-content">
            <div class="message-header">
              <span class="user-name">{{ message.sender.firstName }} {{ message.sender.lastName }}</span>
              <span class="message-date">{{ formatDate(message.sentAt) }}</span>
            </div>

            <div class="message-body">
              <h3 class="message-title">{{ message.subject }}</h3>
              <p class="message-text">{{ message.content }}</p>
            </div>
          </div>
        </div>
      }
    </div>
  </div>
