<div class="page-container">
  <div class="section-header">
    <h1 class="section-title">{{ 'user.proposals.title' | translate }}</h1>
  </div>

  <form [formGroup]="proposalForm" (ngSubmit)="onSubmit()" class="proposal-form">
    
    <div class="form-field">
      <label class="field-label">{{ 'user.proposals.form.title' | translate }}</label>
      <ion-input 
        formControlName="title"
        [placeholder]="'user.proposals.form.titlePlaceholder' | translate">
      </ion-input>
    </div>

    <div class="form-field">
      <label class="field-label">{{ 'user.proposals.form.body' | translate }}</label>
      <ion-textarea 
        formControlName="content" 
        [rows]="6"
        [placeholder]="'user.proposals.form.bodyPlaceholder' | translate">
      </ion-textarea>
    </div>

    <div class="form-field">
      <label class="field-label">{{ 'user.proposals.form.attachment' | translate }}</label>
      <div class="file-upload" (click)="fileInput.click()">
        <input #fileInput type="file" (change)="onFileSelected($event)" hidden>
        
        <div class="upload-content">
          <ion-icon name="cloud-upload-outline"></ion-icon>
          @if (selectedFileName()) {
            <span class="file-name">{{ selectedFileName() }}</span>
            <span class="file-hint">{{ 'user.proposals.form.changeFile' | translate }}</span>
          } @else {
            <span class="upload-label">{{ 'user.proposals.form.uploadText' | translate }}</span>
            <span class="file-hint">{{ 'user.proposals.form.uploadSubtext' | translate }}</span>
          }
        </div>
      </div>
    </div>

    <div class="form-actions">
      <button
        type="submit"
        class="btn-primary"
        [disabled]="!canSubmit() || isSubmitting()">
        @if (isSubmitting()) {
          <ion-spinner name="dots"></ion-spinner>
          {{ 'user.proposals.form.submitting' | translate }}
        } @else {
          {{ 'user.proposals.form.submit' | translate }}
        }
      </button>
    </div>

  </form>
</div>
